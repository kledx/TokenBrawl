name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name = ghcr.io/<owner>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Login to GHCR ────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── Setup Buildx (multi-platform / cache support) ────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Extract metadata for arena image ─────────────────────
      - name: Extract metadata (arena)
        id: meta-arena
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/arena
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ─── Build & push arena image ─────────────────────────────
      - name: Build and push arena image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: arena
          push: true
          tags: ${{ steps.meta-arena.outputs.tags }}
          labels: ${{ steps.meta-arena.outputs.labels }}
          cache-from: type=gha,scope=arena
          cache-to: type=gha,mode=max,scope=arena

      # ─── Extract metadata for web image ───────────────────────
      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ─── Build & push web image ────────────────────────────────
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          # Pass VITE_ARENA_WS_URL from repo secret at build time
          build-args: |
            VITE_ARENA_WS_URL=${{ secrets.VITE_ARENA_WS_URL || 'ws://localhost/arena' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
