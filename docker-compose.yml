version: "3.9"

services:
  # ─── Arena WebSocket Server ───────────────────────────────
  arena:
    image: ${ARENA_IMAGE:-ghcr.io/kledx/tokenbrawl/arena:latest}
    container_name: tokenbrawl
    restart: unless-stopped
    pull_policy: always
    environment:
      - ARENA_PORT=${ARENA_PORT:-3001}
    # Arena is NOT exposed publicly; Nginx proxies /arena → arena:3001
    networks:
      - dokploy-network
      - default

  # ─── Web (Nginx + Vite static) ────────────────────────────
  web:
    image: ${WEB_IMAGE:-ghcr.io/kledx/tokenbrawl/web:latest}
    container_name: colosseum-web
    restart: unless-stopped
    pull_policy: always
    # Port 80 is NOT bound to host — Dokploy's Traefik proxies to container port 80 internally
    expose:
      - "80"
    depends_on:
      - arena
    networks:
      - dokploy-network
      - default

  # ─── Bot Agents (LLM-powered AI debaters) ─────────────────
  bots:
    image: ${ARENA_IMAGE:-ghcr.io/kledx/tokenbrawl/arena:latest}
    container_name: tokenbrawl-bots
    restart: unless-stopped
    pull_policy: always
    # Connect bots to the internal arena service (no public DNS needed)
    command: ["npx", "tsx", "src/arena/botAgents.ts", "ws://arena:3001"]
    environment:
      - ARENA_LLM_BASE_URL=${ARENA_LLM_BASE_URL:-}
      - ARENA_LLM_API_KEY=${ARENA_LLM_API_KEY:-}
      - ARENA_LLM_MODEL=${ARENA_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      - arena
    networks:
      - default

networks:
  dokploy-network:
    external: true
